services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hsil_demo
      POSTGRES_USER: hsil
      POSTGRES_PASSWORD: hsil
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hsil -d hsil_demo"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://hsil:hsil@db:5432/hsil_demo}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      USE_REAL_APIS: ${USE_REAL_APIS:-false}
      FRANKLIN_API_TOKEN: ${FRANKLIN_API_TOKEN:-}
      SEARCH_DEFAULT_LIMIT: ${SEARCH_DEFAULT_LIMIT:-10}
      SEARCH_ANSWER_ENABLED: ${SEARCH_ANSWER_ENABLED:-false}
      SEARCH_ANSWER_TOP_K: ${SEARCH_ANSWER_TOP_K:-5}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - ./data:/app/data

volumes:
  postgres-data:
